<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1A2332"/>
    </marker>
    <marker id="arrowhead-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
    <style>
      text { font-family: 'Inter', sans-serif; fill: #1A2332; }
      .title { font-size: 18px; font-weight: 700; }
      .module-label { font-size: 12px; font-weight: 500; }
      .dim-label { font-size: 10px; fill: #6B7280; }
      .node-label { font-size: 12px; font-weight: 600; }
      .group-label { font-size: 13px; font-weight: 600; fill: #6B7280; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" class="title">Actor-Critic Architecture</text>

  <!-- ===== Online Network group box ===== -->
  <rect x="60" y="55" width="560" height="460" rx="6"
        fill="none" stroke="#1A2332" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text x="340" y="78" text-anchor="middle" class="group-label">Online Network</text>

  <!-- ===== State Input ===== -->
  <rect x="230" y="460" width="120" height="40" rx="20" fill="#EDE9FE" stroke="#1A2332" stroke-width="1.5"/>
  <text x="290" y="484" text-anchor="middle" class="node-label">State s</text>

  <!-- Arrow: State → Encoder -->
  <line x1="290" y1="460" x2="290" y2="430" stroke="#1A2332" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="306" y="450" class="dim-label">[B, D_s]</text>

  <!-- ===== State Encoder (wide) ===== -->
  <rect x="140" y="384" width="300" height="44" rx="6" fill="#E8F0FE" stroke="#1A2332" stroke-width="1.5"/>
  <text x="290" y="410" text-anchor="middle" class="module-label">State Encoder</text>

  <!-- Fork: Encoder → two branches -->
  <!-- Left branch line (to Actor) -->
  <path d="M220,384 L220,356" fill="none" stroke="#1A2332" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="195" y="374" class="dim-label">[B, 256]</text>

  <!-- Right branch line (to Critic) -->
  <path d="M380,384 L380,356" fill="none" stroke="#1A2332" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="396" y="374" class="dim-label">[B, 256]</text>

  <!-- ===== Actor Network (left branch) ===== -->
  <!-- Actor Layer 1 (bottom) -->
  <rect x="130" y="308" width="180" height="44" rx="6" fill="#EDE9FE" stroke="#1A2332" stroke-width="1.5"/>
  <text x="220" y="334" text-anchor="middle" class="module-label">Actor Layer 1</text>

  <!-- Arrow: Actor L1 → L2 -->
  <line x1="220" y1="308" x2="220" y2="274" stroke="#1A2332" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="236" y="296" class="dim-label">[B, 128]</text>

  <!-- Actor Layer 2 (top) -->
  <rect x="130" y="226" width="180" height="44" rx="6" fill="#EDE9FE" stroke="#1A2332" stroke-width="1.5"/>
  <text x="220" y="252" text-anchor="middle" class="module-label">Actor Layer 2</text>

  <!-- Arrow: Actor L2 → Action output -->
  <line x1="220" y1="226" x2="220" y2="178" stroke="#1A2332" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="236" y="206" class="dim-label">[B, D_a]</text>

  <!-- Action output (pill) -->
  <rect x="160" y="134" width="120" height="40" rx="20" fill="#EDE9FE" stroke="#1A2332" stroke-width="1.5"/>
  <text x="220" y="158" text-anchor="middle" class="node-label">Action a</text>

  <!-- ===== Critic Network (right branch) ===== -->
  <!-- Critic Layer 1 (bottom) -->
  <rect x="310" y="308" width="180" height="44" rx="6" fill="#D1FAE5" stroke="#1A2332" stroke-width="1.5"/>
  <text x="400" y="334" text-anchor="middle" class="module-label">Critic Layer 1</text>

  <!-- Arrow: Critic L1 → L2 -->
  <line x1="400" y1="308" x2="400" y2="274" stroke="#1A2332" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="416" y="296" class="dim-label">[B, 128]</text>

  <!-- Critic Layer 2 (top) -->
  <rect x="310" y="226" width="180" height="44" rx="6" fill="#D1FAE5" stroke="#1A2332" stroke-width="1.5"/>
  <text x="400" y="252" text-anchor="middle" class="module-label">Critic Layer 2</text>

  <!-- Arrow: Critic L2 → Q value output -->
  <line x1="400" y1="226" x2="400" y2="178" stroke="#1A2332" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="416" y="206" class="dim-label">[B, 1]</text>

  <!-- Q(s,a) output (pill) -->
  <rect x="340" y="134" width="120" height="40" rx="20" fill="#D1FAE5" stroke="#1A2332" stroke-width="1.5"/>
  <text x="400" y="158" text-anchor="middle" class="node-label">Q(s, a)</text>

  <!-- ===== Target Network (far right) ===== -->
  <rect x="700" y="120" width="210" height="310" rx="6"
        fill="none" stroke="#1A2332" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text x="805" y="148" text-anchor="middle" class="group-label">Target Network</text>

  <!-- Target internal block -->
  <rect x="730" y="170" width="150" height="220" rx="6" fill="#FEF3C7" stroke="#1A2332" stroke-width="1.5"/>

  <!-- Target sub-modules -->
  <rect x="745" y="190" width="120" height="36" rx="6" fill="#FFFFFF" stroke="#1A2332" stroke-width="1"/>
  <text x="805" y="212" text-anchor="middle" class="module-label">Target Encoder</text>

  <rect x="745" y="240" width="120" height="36" rx="6" fill="#FFFFFF" stroke="#1A2332" stroke-width="1"/>
  <text x="805" y="262" text-anchor="middle" class="module-label">Target Critic 1</text>

  <rect x="745" y="290" width="120" height="36" rx="6" fill="#FFFFFF" stroke="#1A2332" stroke-width="1"/>
  <text x="805" y="312" text-anchor="middle" class="module-label">Target Critic 2</text>

  <!-- Target output -->
  <rect x="755" y="344" width="100" height="30" rx="15" fill="#FEF3C7" stroke="#1A2332" stroke-width="1.5"/>
  <text x="805" y="363" text-anchor="middle" class="module-label">Q_target</text>

  <!-- ===== Soft update arrow (Critic → Target) ===== -->
  <path d="M490,280 L660,280 L660,260 L728,260"
        fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4 3"
        marker-end="url(#arrowhead-gray)"/>
  <text x="610" y="272" text-anchor="middle" class="dim-label">soft update &#x3C4;</text>

  <!-- Legend -->
  <line x1="30" y1="525" x2="60" y2="525" stroke="#1A2332" stroke-width="1.5"/>
  <text x="65" y="529" class="dim-label" fill="#1A2332">Data flow</text>
  <line x1="150" y1="525" x2="180" y2="525" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="185" y="529" class="dim-label">Soft update</text>
  <rect x="270" y="518" width="14" height="14" rx="2" fill="none" stroke="#1A2332" stroke-width="1" stroke-dasharray="8 4"/>
  <text x="290" y="529" class="dim-label" fill="#1A2332">Group boundary</text>
</svg>