<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <style>
      text { font-family: 'Inter', system-ui, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #1A2332; }
      .subtitle { font-size: 13px; fill: #6B7280; }
      .module-label { font-size: 12px; font-weight: 600; fill: #1A2332; }
      .callout-text { font-size: 11px; fill: #1A2332; font-family: 'Inter', system-ui, sans-serif; }
      .callout-math { font-size: 13px; font-weight: 600; fill: #1A2332; font-style: italic; }
    </style>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5"
            markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#0066CC"/>
    </marker>
    <marker id="arrow-loop" viewBox="0 0 10 7" refX="9" refY="3.5"
            markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#0066CC"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="#FFFFFF"/>

  <!-- ===== Module Positions (clockwise from top) ===== -->
  <!-- 1. Sample Batch  — top center        (480, 72)  -->
  <!-- 2. Forward Pass  — right             (730, 200) -->
  <!-- 3. Compute Loss  — bottom-right      (660, 390) -->
  <!-- 4. Backward Pass — bottom-left       (300, 390) -->
  <!-- 5. Update Weights— left              (230, 200) -->

  <!-- ===== Step 1: Sample Batch ===== -->
  <rect x="395" y="52" width="170" height="48" rx="6" ry="6"
        fill="#E8F0FE" stroke="#0066CC" stroke-width="1.5"/>
  <text x="480" y="82" text-anchor="middle" class="module-label">Sample Batch</text>

  <!-- ===== Step 2: Forward Pass ===== -->
  <rect x="645" y="176" width="170" height="48" rx="6" ry="6"
        fill="#EDE9FE" stroke="#0066CC" stroke-width="1.5"/>
  <text x="730" y="206" text-anchor="middle" class="module-label">Forward Pass</text>

  <!-- ===== Step 3: Compute Loss ===== -->
  <rect x="575" y="366" width="170" height="48" rx="6" ry="6"
        fill="#FEE2E2" stroke="#0066CC" stroke-width="1.5"/>
  <text x="660" y="396" text-anchor="middle" class="module-label">Compute Loss</text>

  <!-- Callout box for loss formula -->
  <rect x="760" y="356" width="120" height="40" rx="4" ry="4"
        fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="820" y="372" text-anchor="middle" class="callout-text">Loss function</text>
  <text x="820" y="389" text-anchor="middle" class="callout-math">&#x2112; = -&#x2211; y log &#x0177;</text>
  <!-- Callout connector -->
  <line x1="745" y1="387" x2="760" y2="380" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- ===== Step 4: Backward Pass ===== -->
  <rect x="215" y="366" width="170" height="48" rx="6" ry="6"
        fill="#FEF3C7" stroke="#0066CC" stroke-width="1.5"/>
  <text x="300" y="396" text-anchor="middle" class="module-label">Backward Pass</text>

  <!-- ===== Step 5: Update Weights ===== -->
  <rect x="145" y="176" width="170" height="48" rx="6" ry="6"
        fill="#D1FAE5" stroke="#0066CC" stroke-width="1.5"/>
  <text x="230" y="206" text-anchor="middle" class="module-label">Update Weights</text>

  <!-- ===== Curved Arrows (clockwise) ===== -->

  <!-- Arrow 1→2: Sample Batch → Forward Pass -->
  <path d="M 565,85 C 620,85 660,130 690,176"
        fill="none" stroke="#0066CC" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow 2→3: Forward Pass → Compute Loss -->
  <path d="M 730,224 C 730,280 700,330 680,366"
        fill="none" stroke="#0066CC" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow 3→4: Compute Loss → Backward Pass -->
  <path d="M 575,400 C 500,420 440,420 385,400"
        fill="none" stroke="#0066CC" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow 4→5: Backward Pass → Update Weights -->
  <path d="M 270,366 C 250,330 235,280 230,224"
        fill="none" stroke="#0066CC" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow 5→1 (loop back): Update Weights → Sample Batch -->
  <path d="M 270,176 C 300,130 360,85 395,76"
        fill="none" stroke="#0066CC" stroke-width="1.5" marker-end="url(#arrow-loop)"
        stroke-dasharray="6 3"/>

  <!-- Loop label on the 5→1 arrow -->
  <text x="310" y="115" text-anchor="middle" font-size="10" fill="#0066CC"
        font-family="Inter, system-ui, sans-serif" font-style="italic">repeat</text>

  <!-- ===== Center Text ===== -->
  <text x="480" y="252" text-anchor="middle" class="title">Training Loop</text>
  <text x="480" y="274" text-anchor="middle" class="subtitle">Epoch e, Step t</text>

  <!-- ===== Step Number Badges ===== -->
  <circle cx="400" cy="58" r="10" fill="#0066CC"/>
  <text x="400" y="62" text-anchor="middle" font-size="9" fill="#FFFFFF"
        font-family="Inter, system-ui, sans-serif" font-weight="700">1</text>

  <circle cx="650" cy="182" r="10" fill="#0066CC"/>
  <text x="650" y="186" text-anchor="middle" font-size="9" fill="#FFFFFF"
        font-family="Inter, system-ui, sans-serif" font-weight="700">2</text>

  <circle cx="580" cy="372" r="10" fill="#0066CC"/>
  <text x="580" y="376" text-anchor="middle" font-size="9" fill="#FFFFFF"
        font-family="Inter, system-ui, sans-serif" font-weight="700">3</text>

  <circle cx="220" cy="372" r="10" fill="#0066CC"/>
  <text x="220" y="376" text-anchor="middle" font-size="9" fill="#FFFFFF"
        font-family="Inter, system-ui, sans-serif" font-weight="700">4</text>

  <circle cx="150" cy="182" r="10" fill="#0066CC"/>
  <text x="150" y="186" text-anchor="middle" font-size="9" fill="#FFFFFF"
        font-family="Inter, system-ui, sans-serif" font-weight="700">5</text>
</svg>