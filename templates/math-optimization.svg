<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1A2332"/>
    </marker>
    <marker id="arrowhead-path" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1A2332"/>
    </marker>
    <style>
      text { font-family: 'Inter', sans-serif; fill: #1A2332; }
      .title { font-size: 18px; font-weight: 700; }
      .module-label { font-size: 12px; font-weight: 500; }
      .dim-label { font-size: 10px; fill: #6B7280; }
      .axis-label { font-size: 14px; font-weight: 600; }
      .callout-text { font-size: 11px; font-weight: 500; }
      .minimum-label { font-size: 14px; font-weight: 700; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" class="title">Gradient Descent on Loss Landscape</text>

  <!-- Coordinate system -->
  <!-- Y-axis -->
  <line x1="120" y1="80" x2="120" y2="480" stroke="#1A2332" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- X-axis -->
  <line x1="80" y1="460" x2="860" y2="460" stroke="#1A2332" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Axis labels -->
  <text x="860" y="490" text-anchor="middle" class="axis-label">θ₁</text>
  <text x="100" y="80" text-anchor="middle" class="axis-label">θ₂</text>

  <!-- Tick marks on X-axis -->
  <line x1="240" y1="455" x2="240" y2="465" stroke="#1A2332" stroke-width="1"/>
  <line x1="380" y1="455" x2="380" y2="465" stroke="#1A2332" stroke-width="1"/>
  <line x1="520" y1="455" x2="520" y2="465" stroke="#1A2332" stroke-width="1"/>
  <line x1="660" y1="455" x2="660" y2="465" stroke="#1A2332" stroke-width="1"/>
  <line x1="800" y1="455" x2="800" y2="465" stroke="#1A2332" stroke-width="1"/>

  <!-- Tick marks on Y-axis -->
  <line x1="115" y1="380" x2="125" y2="380" stroke="#1A2332" stroke-width="1"/>
  <line x1="115" y1="300" x2="125" y2="300" stroke="#1A2332" stroke-width="1"/>
  <line x1="115" y1="220" x2="125" y2="220" stroke="#1A2332" stroke-width="1"/>
  <line x1="115" y1="140" x2="125" y2="140" stroke="#1A2332" stroke-width="1"/>

  <!-- ===== Contour Ellipses (centered at minimum 420, 300) ===== -->
  <!-- Outermost contour -->
  <ellipse cx="420" cy="290" rx="320" ry="190" fill="none" stroke="#D1D5DB" stroke-width="1" opacity="0.4"/>
  <!-- Contour 2 -->
  <ellipse cx="420" cy="290" rx="260" ry="155" fill="none" stroke="#9CA3AF" stroke-width="1" opacity="0.5"/>
  <!-- Contour 3 -->
  <ellipse cx="420" cy="290" rx="195" ry="118" fill="none" stroke="#6B7280" stroke-width="1" opacity="0.6"/>
  <!-- Contour 4 -->
  <ellipse cx="420" cy="290" rx="130" ry="80" fill="none" stroke="#4B5563" stroke-width="1" opacity="0.7"/>
  <!-- Contour 5 -->
  <ellipse cx="420" cy="290" rx="70" ry="44" fill="none" stroke="#0066CC" stroke-width="1.5" opacity="0.8"/>
  <!-- Innermost contour -->
  <ellipse cx="420" cy="290" rx="24" ry="16" fill="none" stroke="#0066CC" stroke-width="1.5" opacity="1.0"/>

  <!-- ===== Gradient Descent Path ===== -->
  <!-- Path curve (background line) -->
  <path d="M700,130 C680,165 650,180 610,210 C580,232 540,255 490,272 C460,282 445,286 430,289"
        fill="none" stroke="#1A2332" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>

  <!-- Step arrows between points -->
  <line x1="700" y1="130" x2="655" y2="178" stroke="#1A2332" stroke-width="1" opacity="0.5" marker-end="url(#arrowhead-path)"/>
  <line x1="648" y1="184" x2="608" y2="213" stroke="#1A2332" stroke-width="1" opacity="0.5" marker-end="url(#arrowhead-path)"/>
  <line x1="602" y1="218" x2="542" y2="252" stroke="#1A2332" stroke-width="1" opacity="0.5" marker-end="url(#arrowhead-path)"/>
  <line x1="536" y1="256" x2="492" y2="272" stroke="#1A2332" stroke-width="1" opacity="0.5" marker-end="url(#arrowhead-path)"/>
  <line x1="486" y1="275" x2="452" y2="284" stroke="#1A2332" stroke-width="1" opacity="0.5" marker-end="url(#arrowhead-path)"/>
  <line x1="447" y1="286" x2="430" y2="289" stroke="#1A2332" stroke-width="1" opacity="0.5" marker-end="url(#arrowhead-path)"/>

  <!-- Gradient descent points (red → green transition) -->
  <!-- Point 1: start (red) -->
  <circle cx="700" cy="130" r="6" fill="#D55E00" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Point 2 -->
  <circle cx="648" cy="184" r="5.5" fill="#C56A10" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Point 3 -->
  <circle cx="602" cy="218" r="5" fill="#A87A20" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Point 4 -->
  <circle cx="536" cy="256" r="4.5" fill="#6E8C3A" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Point 5 -->
  <circle cx="486" cy="275" r="4" fill="#3E9454" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Point 6 -->
  <circle cx="447" cy="286" r="3.5" fill="#1A9A66" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Point 7: near minimum (green) -->
  <circle cx="428" cy="290" r="3" fill="#009E73" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- ===== Minimum Point ===== -->
  <!-- Star at minimum -->
  <polygon points="420,280 423,287 430,288 425,293 426,300 420,296 414,300 415,293 410,288 417,287"
           fill="#0066CC" stroke="#1A2332" stroke-width="0.5"/>
  <text x="420" y="318" text-anchor="middle" class="minimum-label" fill="#0066CC">θ*</text>

  <!-- ===== Callout Box ===== -->
  <rect x="710" y="180" width="180" height="36" rx="6" fill="#FFFFFF" stroke="#1A2332" stroke-width="1.5"/>
  <text x="800" y="203" text-anchor="middle" class="callout-text">Learning rate: η = 0.01</text>

  <!-- Leader line from callout to path -->
  <line x1="710" y1="198" x2="660" y2="192" stroke="#6B7280" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Legend -->
  <circle cx="140" cy="510" r="5" fill="#D55E00"/>
  <text x="150" y="514" class="dim-label" fill="#1A2332">Start</text>
  <circle cx="200" cy="510" r="5" fill="#009E73"/>
  <text x="210" y="514" class="dim-label" fill="#1A2332">Converged</text>
  <line x1="280" y1="510" x2="310" y2="510" stroke="#6B7280" stroke-width="1"/>
  <text x="315" y="514" class="dim-label" fill="#6B7280">Contour lines</text>
</svg>