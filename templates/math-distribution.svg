<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1A2332"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0066CC"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#009E73"/>
    </marker>
    <clipPath id="plot-area">
      <rect x="120" y="60" width="720" height="400"/>
    </clipPath>
    <style>
      text { font-family: 'Inter', sans-serif; fill: #1A2332; }
      .title { font-size: 18px; font-weight: 700; }
      .module-label { font-size: 12px; font-weight: 500; }
      .dim-label { font-size: 10px; fill: #6B7280; }
      .axis-label { font-size: 14px; font-weight: 600; }
      .annotation { font-size: 12px; font-weight: 500; }
      .legend-label { font-size: 11px; font-weight: 500; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" class="title">Class-Conditional Distributions</text>

  <!-- Coordinate system -->
  <!-- Y-axis -->
  <line x1="140" y1="70" x2="140" y2="460" stroke="#1A2332" stroke-width="1.5"/>
  <line x1="140" y1="70" x2="140" y2="60" stroke="#1A2332" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- X-axis -->
  <line x1="120" y1="440" x2="850" y2="440" stroke="#1A2332" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Axis labels -->
  <text x="850" y="468" text-anchor="middle" class="axis-label">x</text>
  <text x="115" y="70" text-anchor="middle" class="axis-label">p(x)</text>

  <!-- Tick marks on X-axis -->
  <line x1="260" y1="435" x2="260" y2="445" stroke="#1A2332" stroke-width="1"/>
  <text x="260" y="458" text-anchor="middle" class="dim-label">-2</text>
  <line x1="380" y1="435" x2="380" y2="445" stroke="#1A2332" stroke-width="1"/>
  <text x="380" y="458" text-anchor="middle" class="dim-label">-1</text>
  <line x1="500" y1="435" x2="500" y2="445" stroke="#1A2332" stroke-width="1"/>
  <text x="500" y="458" text-anchor="middle" class="dim-label">0</text>
  <line x1="620" y1="435" x2="620" y2="445" stroke="#1A2332" stroke-width="1"/>
  <text x="620" y="458" text-anchor="middle" class="dim-label">1</text>
  <line x1="740" y1="435" x2="740" y2="445" stroke="#1A2332" stroke-width="1"/>
  <text x="740" y="458" text-anchor="middle" class="dim-label">2</text>

  <!-- ===== Overlap shaded region (drawn first, behind curves) ===== -->
  <path d="M420,440 C430,420 445,370 460,330 C472,300 485,275 500,260
           C500,260 485,275 472,300 C460,330 445,370 430,395 C425,410 420,430 420,440 Z"
        fill="#E8D5F5" opacity="0.5" clip-path="url(#plot-area)"/>
  <!-- Simpler overlap region as a polygon -->
  <polygon points="440,440 460,380 475,330 490,300 500,280 510,300 525,330 540,380 560,440"
           fill="#E8D5F5" opacity="0.4" clip-path="url(#plot-area)"/>

  <!-- ===== Class 0 Bell Curve (centered at x=-1 → 380px) ===== -->
  <path d="M160,440 C180,438 220,430 260,400 C290,374 320,320 345,250
           C360,210 370,170 380,150
           C390,170 400,210 415,250
           C440,320 470,374 500,400
           C540,430 580,438 600,440"
        fill="#E8F0FE" fill-opacity="0.5" stroke="#0066CC" stroke-width="1.5"
        clip-path="url(#plot-area)"/>
  <!-- Close the fill at bottom -->
  <path d="M160,440 C180,438 220,430 260,400 C290,374 320,320 345,250
           C360,210 370,170 380,150
           C390,170 400,210 415,250
           C440,320 470,374 500,400
           C540,430 580,438 600,440 Z"
        fill="#E8F0FE" fill-opacity="0.4" stroke="none"
        clip-path="url(#plot-area)"/>

  <!-- ===== Class 1 Bell Curve (centered at x=+1 → 620px) ===== -->
  <path d="M360,440 C380,438 420,430 460,400 C490,374 520,320 545,250
           C560,210 570,170 580,150 L580,150
           C590,170 600,210 615,250
           C640,320 670,374 700,400
           C740,430 780,438 800,440"
        fill="#D1FAE5" fill-opacity="0.5" stroke="#009E73" stroke-width="1.5"
        clip-path="url(#plot-area)"/>
  <!-- Close the fill at bottom -->
  <path d="M360,440 C380,438 420,430 460,400 C490,374 520,320 545,250
           C560,210 570,170 580,150
           C590,170 600,210 615,250
           C640,320 670,374 700,400
           C740,430 780,438 800,440 Z"
        fill="#D1FAE5" fill-opacity="0.4" stroke="none"
        clip-path="url(#plot-area)"/>

  <!-- ===== Decision Boundary ===== -->
  <line x1="480" y1="80" x2="480" y2="440" stroke="#1A2332" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text x="480" y="75" text-anchor="middle" class="annotation" fill="#1A2332">Decision Boundary</text>

  <!-- ===== μ annotations ===== -->
  <!-- μ₀ arrow and label -->
  <line x1="380" y1="145" x2="380" y2="130" stroke="#0066CC" stroke-width="1"/>
  <text x="380" y="122" text-anchor="middle" class="annotation" fill="#0066CC">μ₀ = -1</text>

  <!-- μ₁ arrow and label -->
  <line x1="580" y1="145" x2="580" y2="130" stroke="#009E73" stroke-width="1"/>
  <text x="580" y="122" text-anchor="middle" class="annotation" fill="#009E73">μ₁ = +1</text>

  <!-- ===== σ annotations ===== -->
  <!-- σ₀: double-headed arrow at ~60% height of Class 0 curve -->
  <line x1="310" y1="285" x2="448" y2="285" stroke="#0066CC" stroke-width="1" marker-end="url(#arrowhead-blue)"/>
  <line x1="450" y1="285" x2="312" y2="285" stroke="#0066CC" stroke-width="1" marker-end="url(#arrowhead-blue)"/>
  <text x="380" y="278" text-anchor="middle" class="dim-label" fill="#0066CC">σ₀</text>

  <!-- σ₁: double-headed arrow at ~60% height of Class 1 curve -->
  <line x1="510" y1="285" x2="648" y2="285" stroke="#009E73" stroke-width="1" marker-end="url(#arrowhead-green)"/>
  <line x1="650" y1="285" x2="512" y2="285" stroke="#009E73" stroke-width="1" marker-end="url(#arrowhead-green)"/>
  <text x="580" y="278" text-anchor="middle" class="dim-label" fill="#009E73">σ₁</text>

  <!-- ===== Legend Box ===== -->
  <rect x="770" y="80" width="150" height="70" rx="6" fill="#FFFFFF" stroke="#1A2332" stroke-width="1.5"/>
  <circle cx="790" cy="102" r="5" fill="#E8F0FE" stroke="#0066CC" stroke-width="1.5"/>
  <text x="802" y="106" class="legend-label" fill="#1A2332">Class 0</text>
  <circle cx="790" cy="126" r="5" fill="#D1FAE5" stroke="#009E73" stroke-width="1.5"/>
  <text x="802" y="130" class="legend-label" fill="#1A2332">Class 1</text>
  <rect x="783" y="143" width="14" height="4" rx="1" fill="#E8D5F5" opacity="0.7"/>
  <text x="802" y="150" class="dim-label" fill="#1A2332">Overlap</text>
</svg>