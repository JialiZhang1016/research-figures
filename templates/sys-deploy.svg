<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1A2332"/>
    </marker>
    <marker id="arrowhead-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9CA3AF"/>
    </marker>
    <style>
      text { font-family: 'Inter', sans-serif; fill: #1A2332; }
      .title { font-size: 18px; font-weight: 700; }
      .module-label { font-size: 12px; font-weight: 500; }
      .dim-label { font-size: 10px; fill: #6B7280; }
      .group-label { font-size: 13px; font-weight: 600; fill: #6B7280; }
      .user-icon { font-size: 28px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" class="title">Production Deployment Topology</text>

  <!-- ===== Users (left side) ===== -->
  <!-- Person silhouette 1 -->
  <circle cx="60" cy="165" r="12" fill="none" stroke="#1A2332" stroke-width="1.5"/>
  <path d="M42,210 C42,190 50,185 60,185 C70,185 78,190 78,210" fill="none" stroke="#1A2332" stroke-width="1.5"/>
  <!-- Person silhouette 2 -->
  <circle cx="80" cy="185" r="10" fill="none" stroke="#1A2332" stroke-width="1.5"/>
  <path d="M64,225 C64,208 72,204 80,204 C88,204 96,208 96,225" fill="none" stroke="#1A2332" stroke-width="1.5"/>
  <!-- Person silhouette 3 -->
  <circle cx="45" cy="195" r="9" fill="none" stroke="#1A2332" stroke-width="1.5"/>
  <path d="M30,230 C30,215 38,211 45,211 C52,211 60,215 60,230" fill="none" stroke="#1A2332" stroke-width="1.5"/>
  <text x="62" y="252" text-anchor="middle" class="module-label">Users</text>

  <!-- Arrow: Users → CDN/LB -->
  <line x1="100" y1="200" x2="168" y2="200" stroke="#1A2332" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ===== CDN / Load Balancer ===== -->
  <rect x="170" y="175" width="180" height="50" rx="6" fill="#FEF3C7" stroke="#1A2332" stroke-width="1.5"/>
  <text x="260" y="205" text-anchor="middle" class="module-label">CDN / Load Balancer</text>

  <!-- ===== Cloud Group (dashed border) ===== -->
  <rect x="390" y="70" width="340" height="330" rx="12" fill="none" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text x="560" y="90" text-anchor="middle" class="group-label">Cloud (AWS / GCP)</text>

  <!-- Arrows: LB → Server instances -->
  <line x1="350" y1="190" x2="418" y2="140" stroke="#1A2332" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="200" x2="418" y2="210" stroke="#1A2332" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="210" x2="418" y2="280" stroke="#1A2332" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ===== Server Instances ===== -->
  <!-- Instance 1 -->
  <rect x="420" y="110" width="140" height="44" rx="6" fill="#D1FAE5" stroke="#1A2332" stroke-width="1.5"/>
  <text x="490" y="136" text-anchor="middle" class="module-label">Instance 1</text>

  <!-- Instance 2 -->
  <rect x="420" y="185" width="140" height="44" rx="6" fill="#D1FAE5" stroke="#1A2332" stroke-width="1.5"/>
  <text x="490" y="211" text-anchor="middle" class="module-label">Instance 2</text>

  <!-- Instance 3 -->
  <rect x="420" y="260" width="140" height="44" rx="6" fill="#D1FAE5" stroke="#1A2332" stroke-width="1.5"/>
  <text x="490" y="286" text-anchor="middle" class="module-label">Instance 3</text>

  <!-- ===== Database (right side) ===== -->
  <!-- Primary DB (cylinder) -->
  <ellipse cx="810" cy="160" rx="55" ry="12" fill="#E8F0FE" stroke="#1A2332" stroke-width="1.5"/>
  <rect x="755" y="160" width="110" height="50" fill="#E8F0FE" stroke="none"/>
  <line x1="755" y1="160" x2="755" y2="210" stroke="#1A2332" stroke-width="1.5"/>
  <line x1="865" y1="160" x2="865" y2="210" stroke="#1A2332" stroke-width="1.5"/>
  <ellipse cx="810" cy="210" rx="55" ry="12" fill="#E8F0FE" stroke="#1A2332" stroke-width="1.5"/>
  <text x="810" y="191" text-anchor="middle" class="module-label">Database</text>
  <text x="810" y="236" text-anchor="middle" class="dim-label">Primary</text>

  <!-- Arrows: Servers → Primary DB -->
  <line x1="560" y1="132" x2="753" y2="175" stroke="#1A2332" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="560" y1="207" x2="753" y2="185" stroke="#1A2332" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="560" y1="282" x2="753" y2="195" stroke="#1A2332" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Replica DB (cylinder, lighter) -->
  <ellipse cx="810" cy="300" rx="50" ry="10" fill="#F0F7FF" stroke="#1A2332" stroke-width="1"/>
  <rect x="760" y="300" width="100" height="42" fill="#F0F7FF" stroke="none"/>
  <line x1="760" y1="300" x2="760" y2="342" stroke="#1A2332" stroke-width="1"/>
  <line x1="860" y1="300" x2="860" y2="342" stroke="#1A2332" stroke-width="1"/>
  <ellipse cx="810" cy="342" rx="50" ry="10" fill="#F0F7FF" stroke="#1A2332" stroke-width="1"/>
  <text x="810" y="326" text-anchor="middle" class="module-label">Replica</text>

  <!-- Replication arrow: Primary → Replica -->
  <line x1="810" y1="222" x2="810" y2="288" stroke="#1A2332" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="838" y="260" class="dim-label">replication</text>

  <!-- ===== Monitoring / Logs ===== -->
  <rect x="350" y="440" width="260" height="50" rx="6" fill="#EDE9FE" stroke="#1A2332" stroke-width="1.5"/>
  <text x="480" y="470" text-anchor="middle" class="module-label">Monitoring / Logs</text>

  <!-- Dotted arrows: Servers → Monitoring -->
  <line x1="470" y1="154" x2="440" y2="438" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowhead-gray)"/>
  <line x1="490" y1="229" x2="475" y2="438" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowhead-gray)"/>
  <line x1="510" y1="304" x2="510" y2="438" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowhead-gray)"/>

  <!-- Legend -->
  <rect x="30" y="510" width="14" height="10" rx="2" fill="#FEF3C7" stroke="#1A2332" stroke-width="1"/>
  <text x="50" y="520" class="dim-label" fill="#1A2332">Load Balancer</text>
  <rect x="140" y="510" width="14" height="10" rx="2" fill="#D1FAE5" stroke="#1A2332" stroke-width="1"/>
  <text x="160" y="520" class="dim-label" fill="#1A2332">Compute</text>
  <rect x="220" y="510" width="14" height="10" rx="2" fill="#E8F0FE" stroke="#1A2332" stroke-width="1"/>
  <text x="240" y="520" class="dim-label" fill="#1A2332">Storage</text>
  <rect x="290" y="510" width="14" height="10" rx="2" fill="#EDE9FE" stroke="#1A2332" stroke-width="1"/>
  <text x="310" y="520" class="dim-label" fill="#1A2332">Monitoring</text>
</svg>